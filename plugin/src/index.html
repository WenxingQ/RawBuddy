<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RawBuddy</title>
  <style>
/* ── Base ─────────────────────────────────────────────── */
:root {
  --bg: #1e1e1e;
  --bg-raised: #2a2a2a;
  --bg-hover: #333;
  --border: #444;
  --text: #e0e0e0;
  --text-muted: #999;
  --text-subtle: #b8b8b8;
  --accent: #4aa0ff;
  --accent-hover: #5ba8ff;
  --error: #f06060;
  --success: #5cba6a;
  --score-mid: #f5a623;
  --radius: 4px;
  --font: 'Adobe Clean', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: var(--font);
  font-size: 12px;
  background: var(--bg);
  color: var(--text);
}
#root { height: 100%; display: flex; flex-direction: column; }

/* ── Tab Bar ──────────────────────────────────────────── */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1;
  padding: 7px 2px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-size: 10px;
  font-family: var(--font);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Tab Content ──────────────────────────────────────── */
.tab-content {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  padding: 14px 12px;
}

/* ── Command Input ────────────────────────────────────── */
.command-textarea {
  width: 100%;
  min-height: 80px;
  resize: vertical;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  line-height: 1.5;
  padding: 8px;
  outline: none;
}
.command-textarea:focus { border-color: var(--accent); }
.command-textarea::placeholder { color: var(--text-muted); }

.btn-primary {
  width: 100%;
  padding: 7px 12px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Explanation box ──────────────────────────────────── */
.explanation-box {
  background: var(--bg-raised);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 8px 10px;
  font-size: 11px;
  color: var(--text);
  line-height: 1.5;
}
.explanation-box .label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

/* ── Status / Error ───────────────────────────────────── */
.status-error {
  background: rgba(240, 96, 96, 0.1);
  border: 1px solid var(--error);
  border-radius: var(--radius);
  padding: 7px 9px;
  color: var(--error);
  font-size: 11px;
  line-height: 1.4;
}
/* ── Edit History ─────────────────────────────────────── */
.history-empty {
  color: var(--text-muted);
  font-size: 11px;
  text-align: center;
  padding: 24px 0;
}
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
}
.history-item .command { font-size: 11px; color: var(--text); margin-bottom: 3px; }
.history-item .meta { font-size: 10px; color: var(--text-muted); }
.history-item .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.tag {
  background: var(--bg-hover);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 10px;
  color: var(--text-muted);
}

/* ── Settings ─────────────────────────────────────────── */
.settings-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: block; }
.settings-input {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
}
.settings-input:focus { border-color: var(--accent); }
.settings-hint { font-size: 10px; color: var(--text-muted); line-height: 1.4; margin-top: 4px; }
.status-saved { color: var(--success); font-size: 11px; padding: 2px 0; }
.status-neutral { color: var(--text-muted); font-size: 11px; padding: 2px 0; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}

  </style>
</head>
<body>
  <!-- root div is created programmatically in index.jsx (UXP parses body after scripts run) -->
</body>
</html>
